services:
  app:
    build: .
    container_name: algodrill-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/algodrill.sqlite
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      SETUP_TOKEN: ${SETUP_TOKEN}
      EXPORT_API_TOKEN: ${EXPORT_API_TOKEN}
      EXPORT_API_USER_EMAIL: ${EXPORT_API_USER_EMAIL}
      TZ: America/Sao_Paulo
    volumes:
      - app-data:/data
    expose:
      - '3000'
    networks:
      caddy_net:
        aliases:
          - algodrill-app
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

  litestream:
    image: litestream/litestream:0.3
    container_name: algodrill-litestream
    restart: unless-stopped
    depends_on:
      - app
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY}
      LITESTREAM_BUCKET: ${LITESTREAM_BUCKET}
      LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT}
      LITESTREAM_REGION: ${LITESTREAM_REGION}
      TZ: America/Sao_Paulo
    volumes:
      - app-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ['replicate', '-config', '/etc/litestream.yml']
    networks:
      - caddy_net

volumes:
  app-data:

networks:
  caddy_net:
    external: true
